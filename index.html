<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Motion Lab — Design Token Gallery</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ─────────────────────────────────────────
   DESIGN TOKENS — THREE COMPLETE THEMES
   ───────────────────────────────────────── */

      /* DEFAULT: VOID (dark ink lab) */
      :root,
      #theme-void:checked ~ * {
        --bg: #0a0a0c;
        --surface: #111115;
        --surface2: #1a1a20;
        --border: #2a2a35;
        --text: #e8e8f0;
        --text-muted: #6a6a80;
        --accent: #c8ff00;
        --accent2: #00d4ff;
        --accent3: #ff3c6e;
        --glow: rgba(200, 255, 0, 0.15);
        --glow2: rgba(0, 212, 255, 0.15);
        --card-radius: 4px;
        --gap: 1.5rem;
        --speed: 1s;
        --font-display: "Fraunces", serif;
        --font-mono: "DM Mono", monospace;
        --label-style: italic;
        --badge-bg: #1a1a20;
        --badge-border: #2a2a35;
        --grid-cols: repeat(auto-fill, minmax(240px, 1fr));
      }

      #theme-ember:checked ~ * {
        --bg: #1c0a00;
        --surface: #2a1000;
        --surface2: #3a1a00;
        --border: #5a2800;
        --text: #ffecd0;
        --text-muted: #9a6040;
        --accent: #ff7a1a;
        --accent2: #ffd700;
        --accent3: #ff1a6e;
        --glow: rgba(255, 122, 26, 0.2);
        --glow2: rgba(255, 215, 0, 0.15);
        --card-radius: 0px;
        --gap: 1.5rem;
        --speed: 0.7s;
        --font-display: "Fraunces", serif;
        --font-mono: "DM Mono", monospace;
        --label-style: italic;
        --badge-bg: #3a1a00;
        --badge-border: #5a2800;
        --grid-cols: repeat(auto-fill, minmax(240px, 1fr));
      }
      a {
        text-decoration: none; /* removes underline */
        color: inherit; /* keeps the text color same as parent */
      }

      /* ─────────────────────────────────────────
   HIDE RADIO INPUTS
   ───────────────────────────────────────── */
      #theme-void,
      #theme-ember {
        display: none;
      }

      /* ─────────────────────────────────────────
   BASE
   ───────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        min-height: 100vh;
        transition:
          background 0.6s ease,
          color 0.6s ease;
        overflow-x: hidden;
      }

      /* ─────────────────────────────────────────
   HEADER
   ───────────────────────────────────────── */
      header {
        padding: 3rem var(--gap) 2rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1.5rem;
        transition: border-color 0.6s ease;
      }

      .header-left h1 {
        font-family: var(--font-display);
        font-size: clamp(2.2rem, 5vw, 4rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1;
        color: var(--text);
        transition: color 0.6s ease;
      }

      .header-left h1 em {
        font-style: var(--label-style);
        color: var(--accent);
        transition: color 0.6s ease;
      }

      .header-left p {
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color 0.6s ease;
      }

      /* ─────────────────────────────────────────
   THEME SWITCHER (pure CSS radio)
   ───────────────────────────────────────── */
      .theme-switcher {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .theme-switcher label {
        padding: 0.4rem 0.9rem;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        border: 1px solid var(--border);
        border-radius: var(--card-radius);
        color: var(--text-muted);
        background: var(--surface);
        transition: all 0.3s ease;
      }

      .theme-switcher label:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      #theme-void:checked ~ * .lbl-void,
      #theme-ember:checked ~ * .lbl-ember {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg);
        font-weight: 500;
      }

      /* ─────────────────────────────────────────
   GALLERY GRID
   ───────────────────────────────────────── */
      .gallery {
        display: grid;
        grid-template-columns: var(--grid-cols);
        gap: var(--gap);
        padding: var(--gap);
        transition: gap 0.6s ease;
      }

      /* ─────────────────────────────────────────
   CARD BASE
   ───────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--card-radius);
        overflow: hidden;
        transition:
          background 0.6s ease,
          border-color 0.6s ease,
          border-radius 0.6s ease,
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 40px var(--glow);
        border-color: var(--accent);
      }

      .canvas {
        height: 200px;
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        transition: background 0.6s ease;
      }

      .card-meta {
        padding: 1rem;
        border-top: 1px solid var(--border);
        transition: border-color 0.6s ease;
      }

      .card-meta h3 {
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 300;
        font-style: var(--label-style);
        color: var(--text);
        transition: color 0.6s ease;
      }

      /* ─────────────────────────────────────────
   1. ORBITAL RING
   ───────────────────────────────────────── */
      .orbital {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 2px solid var(--border);
        position: relative;
        animation: spin calc(var(--speed) * 4) linear infinite;
        transition: border-color 0.6s ease;
      }
      .orbital::before {
        content: "";
        position: absolute;
        top: -5px;
        left: 50%;
        transform: translateX(-50%);
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
        transition:
          background 0.6s ease,
          box-shadow 0.6s ease;
      }
      .orbital-inner {
        position: absolute;
        inset: 14px;
        border-radius: 50%;
        border: 1px solid var(--accent2);
        animation: spin calc(var(--speed) * 2.5) linear infinite reverse;
        transition: border-color 0.6s ease;
      }
      .orbital-inner::before {
        content: "";
        position: absolute;
        top: -4px;
        left: 50%;
        transform: translateX(-50%);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent2);
        transition: background 0.6s ease;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ─────────────────────────────────────────
   2. MORPHING BLOB
   ───────────────────────────────────────── */
      .blob {
        width: 100px;
        height: 100px;
        background: var(--accent);
        animation:
          blob-morph calc(var(--speed) * 4) ease-in-out infinite,
          blob-pulse calc(var(--speed) * 2) ease-in-out infinite alternate;
        opacity: 0.85;
        transition: background 0.6s ease;
      }
      @keyframes blob-morph {
        0%,
        100% {
          border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
        25% {
          border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
        }
        50% {
          border-radius: 50% 60% 30% 60% / 30% 40% 70% 50%;
        }
        75% {
          border-radius: 70% 30% 50% 50% / 40% 70% 30% 60%;
        }
      }
      @keyframes blob-pulse {
        from {
          transform: scale(0.92);
        }
        to {
          transform: scale(1.06);
        }
      }

      /* ─────────────────────────────────────────
   3. TYPEWRITER
   ───────────────────────────────────────── */
      .typewriter-wrap {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        align-items: flex-start;
        padding: 0 1.5rem;
      }
      .typewriter {
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: var(--accent);
        overflow: hidden;
        white-space: nowrap;
        border-right: 2px solid var(--accent);
        width: 0;
        transition:
          color 0.6s ease,
          border-color 0.6s ease;
      }
      .t1 {
        animation:
          typing calc(var(--speed) * 2) steps(18, end) calc(var(--speed) * 0)
            forwards,
          blink 0.75s step-end calc(var(--speed) * 2) 3;
        width: 0;
      }
      .t2 {
        animation:
          typing calc(var(--speed) * 2) steps(22, end) calc(var(--speed) * 2.5)
            forwards,
          blink 0.75s step-end infinite;
        opacity: 0;
        animation-fill-mode: both;
      }
      .t3 {
        animation: typing calc(var(--speed) * 1.5) steps(16, end)
          calc(var(--speed) * 5) forwards;
        opacity: 0;
        animation-fill-mode: both;
        border-right: none;
      }

      @keyframes typing {
        from {
          width: 0;
          opacity: 1;
        }
        to {
          width: 14em;
          opacity: 1;
        }
      }
      @keyframes blink {
        0%,
        100% {
          border-color: var(--accent);
        }
        50% {
          border-color: transparent;
        }
      }

      /* ─────────────────────────────────────────
   4. NEON SIGN FLICKER
   ───────────────────────────────────────── */
      .neon {
        font-family: var(--font-display);
        font-size: 2.8rem;
        font-weight: 700;
        font-style: italic;
        color: var(--accent);
        text-shadow:
          0 0 8px var(--accent),
          0 0 20px var(--accent),
          0 0 40px var(--accent);
        animation: neon-flicker calc(var(--speed) * 3) steps(1) infinite;
        transition: color 0.6s ease;
        user-select: none;
        letter-spacing: -0.02em;
      }
      @keyframes neon-flicker {
        0%,
        19%,
        21%,
        23%,
        25%,
        54%,
        56%,
        100% {
          text-shadow:
            0 0 8px var(--accent),
            0 0 20px var(--accent),
            0 0 40px var(--accent);
          opacity: 1;
        }
        20%,
        22%,
        24%,
        55% {
          text-shadow: none;
          opacity: 0.4;
        }
      }

      /* ─────────────────────────────────────────
   5. DNA HELIX (staggered dots)
   ───────────────────────────────────────── */
      .dna {
        display: flex;
        flex-direction: column;
        gap: 5px;
        align-items: center;
      }
      .dna-row {
        display: flex;
        gap: 40px;
        align-items: center;
      }
      .dna-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        transition: background 0.6s ease;
      }
      .dna-dot.a {
        background: var(--accent);
      }
      .dna-dot.b {
        background: var(--accent2);
      }
      .dna-bar {
        width: 40px;
        height: 1px;
        background: var(--border);
        position: absolute;
        transition: background 0.6s ease;
      }
      .dna-row {
        position: relative;
      }

      /* animate each row with staggered vertical drift */
      .dna-row:nth-child(1) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite 0s
          alternate;
      }
      .dna-row:nth-child(2) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite
          calc(var(--speed) * 0.3) alternate;
      }
      .dna-row:nth-child(3) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite
          calc(var(--speed) * 0.6) alternate;
      }
      .dna-row:nth-child(4) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite
          calc(var(--speed) * 0.9) alternate;
      }
      .dna-row:nth-child(5) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite
          calc(var(--speed) * 1.2) alternate;
      }
      .dna-row:nth-child(6) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite
          calc(var(--speed) * 1.5) alternate;
      }
      .dna-row:nth-child(7) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite
          calc(var(--speed) * 1.8) alternate;
      }
      .dna-row:nth-child(8) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite
          calc(var(--speed) * 2.1) alternate;
      }
      .dna-row:nth-child(9) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite
          calc(var(--speed) * 2.4) alternate;
      }
      .dna-row:nth-child(10) {
        animation: dna-drift calc(var(--speed) * 3) ease-in-out infinite
          calc(var(--speed) * 2.7) alternate;
      }

      @keyframes dna-drift {
        from {
          transform: translateX(-10px) scaleX(0.7);
        }
        to {
          transform: translateX(10px) scaleX(1.3);
        }
      }

      /* ─────────────────────────────────────────
   6. SOLAR SYSTEM
   ───────────────────────────────────────── */
      .solar {
        position: relative;
        width: 130px;
        height: 130px;
      }
      .sun {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--accent2);
        box-shadow:
          0 0 16px var(--accent2),
          0 0 32px var(--glow2);
        animation: sun-pulse calc(var(--speed) * 2) ease-in-out infinite
          alternate;
        transition:
          background 0.6s ease,
          box-shadow 0.6s ease;
      }
      @keyframes sun-pulse {
        from {
          transform: translate(-50%, -50%) scale(1);
        }
        to {
          transform: translate(-50%, -50%) scale(1.15);
        }
      }
      .orbit {
        position: absolute;
        top: 50%;
        left: 50%;
        border-radius: 50%;
        border: 1px solid var(--border);
        transform-origin: 50% 50%;
        transition: border-color 0.6s ease;
      }
      .orbit-1 {
        width: 44px;
        height: 44px;
        margin: -22px 0 0 -22px;
        animation: spin calc(var(--speed) * 2) linear infinite;
      }
      .orbit-2 {
        width: 78px;
        height: 78px;
        margin: -39px 0 0 -39px;
        animation: spin calc(var(--speed) * 3.5) linear infinite;
      }
      .orbit-3 {
        width: 118px;
        height: 118px;
        margin: -59px 0 0 -59px;
        animation: spin calc(var(--speed) * 6) linear infinite;
      }
      .planet {
        position: absolute;
        border-radius: 50%;
        top: 0;
        left: 50%;
      }
      .planet-1 {
        width: 7px;
        height: 7px;
        background: var(--accent3);
        margin: -3.5px 0 0 -3.5px;
        transition: background 0.6s ease;
      }
      .planet-2 {
        width: 9px;
        height: 9px;
        background: var(--accent);
        margin: -4.5px 0 0 -4.5px;
        transition: background 0.6s ease;
      }
      .planet-3 {
        width: 7px;
        height: 7px;
        background: var(--accent2);
        margin: -3.5px 0 0 -3.5px;
        transition: background 0.6s ease;
      }

      /* ─────────────────────────────────────────
   8. LOADING BARS (equaliser)
   ───────────────────────────────────────── */
      .bars {
        display: flex;
        gap: 6px;
        align-items: flex-end;
        height: 70px;
      }
      .bar {
        width: 10px;
        border-radius: 3px 3px 0 0;
        animation: bar-eq calc(var(--speed) * 1.2) ease-in-out infinite
          alternate;
        transition: background 0.6s ease;
      }
      .bar:nth-child(1) {
        background: var(--accent);
        height: 30%;
        animation-delay: 0s;
      }
      .bar:nth-child(2) {
        background: var(--accent);
        height: 70%;
        animation-delay: calc(var(--speed) * 0.15);
      }
      .bar:nth-child(3) {
        background: var(--accent2);
        height: 50%;
        animation-delay: calc(var(--speed) * 0.3);
      }
      .bar:nth-child(4) {
        background: var(--accent2);
        height: 90%;
        animation-delay: calc(var(--speed) * 0.45);
      }
      .bar:nth-child(5) {
        background: var(--accent3);
        height: 40%;
        animation-delay: calc(var(--speed) * 0.6);
      }
      .bar:nth-child(6) {
        background: var(--accent3);
        height: 80%;
        animation-delay: calc(var(--speed) * 0.75);
      }
      .bar:nth-child(7) {
        background: var(--accent);
        height: 55%;
        animation-delay: calc(var(--speed) * 0.9);
      }
      .bar:nth-child(8) {
        background: var(--accent);
        height: 35%;
        animation-delay: calc(var(--speed) * 1.05);
      }
      @keyframes bar-eq {
        from {
          transform: scaleY(0.2);
        }
        to {
          transform: scaleY(1);
        }
      }

      /* ─────────────────────────────────────────
   9. SPINNER TRIO
   ───────────────────────────────────────── */
      .spinner-trio {
        position: relative;
        width: 80px;
        height: 80px;
      }
      .ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
        transition: border-color 0.6s ease;
      }
      .ring-1 {
        border-top-color: var(--accent);
        animation: spin calc(var(--speed) * 1) linear infinite;
      }
      .ring-2 {
        inset: 10px;
        border-right-color: var(--accent2);
        animation: spin calc(var(--speed) * 1.6) linear infinite reverse;
      }
      .ring-3 {
        inset: 20px;
        border-bottom-color: var(--accent3);
        animation: spin calc(var(--speed) * 2.3) linear infinite;
      }

      /* ─────────────────────────────────────────
   10. STARBURST PULSE
   ───────────────────────────────────────── */
      .starburst {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .star-ring {
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 1px solid var(--accent);
        animation: star-expand calc(var(--speed) * 2) ease-out infinite;
        opacity: 0;
        transition: border-color 0.6s ease;
      }
      .star-ring:nth-child(2) {
        animation-delay: calc(var(--speed) * 0.7);
      }
      .star-ring:nth-child(3) {
        animation-delay: calc(var(--speed) * 1.4);
      }
      .star-core {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 16px var(--glow);
        z-index: 1;
        transition:
          background 0.6s ease,
          box-shadow 0.6s ease;
      }
      @keyframes star-expand {
        0% {
          transform: scale(0.2);
          opacity: 0.8;
        }
        100% {
          transform: scale(2.2);
          opacity: 0;
        }
      }

      /* ─────────────────────────────────────────
   12. GRID WIPE
   ───────────────────────────────────────── */
      .grid-wipe {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 2px;
        width: 120px;
        height: 80px;
      }
      .cell {
        border-radius: 2px;
        background: var(--surface2);
        animation: cell-flash calc(var(--speed) * 4) ease-in-out infinite;
        transition: background 0.6s ease;
      }
      .cell:nth-child(1) {
        animation-delay: 0s;
      }
      .cell:nth-child(2) {
        animation-delay: calc(var(--speed) * 0.2);
      }
      .cell:nth-child(3) {
        animation-delay: calc(var(--speed) * 0.4);
      }
      .cell:nth-child(4) {
        animation-delay: calc(var(--speed) * 0.6);
      }
      .cell:nth-child(5) {
        animation-delay: calc(var(--speed) * 0.8);
      }
      .cell:nth-child(6) {
        animation-delay: calc(var(--speed) * 1);
      }
      .cell:nth-child(7) {
        animation-delay: calc(var(--speed) * 0.3);
      }
      .cell:nth-child(8) {
        animation-delay: calc(var(--speed) * 0.5);
      }
      .cell:nth-child(9) {
        animation-delay: calc(var(--speed) * 0.7);
      }
      .cell:nth-child(10) {
        animation-delay: calc(var(--speed) * 0.9);
      }
      .cell:nth-child(11) {
        animation-delay: calc(var(--speed) * 1.1);
      }
      .cell:nth-child(12) {
        animation-delay: calc(var(--speed) * 1.3);
      }
      .cell:nth-child(odd) {
        animation-delay: calc(var(--speed) * 0.15);
      }
      @keyframes cell-flash {
        0%,
        100% {
          background: var(--surface2);
        }
        50% {
          background: var(--accent);
          opacity: 0.7;
        }
      }

      /* ─────────────────────────────────────────
   FOOTER
   ───────────────────────────────────────── */
      footer {
        margin-top: 2rem;
        padding: 1.5rem var(--gap);
        border-top: 1px solid var(--border);
        font-size: 0.65rem;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
        transition:
          border-color 0.6s ease,
          color 0.6s ease;
      }
